
services:

  eureka-server:
    build: ./eureka-server/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - micro-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - micro-net

  mysql-auth:
    image: mysql:8
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - micro-net

  mysql-course:
    image: mysql:8
    container_name: mysql-course
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-course-data:/var/lib/mysql
    networks:
      - micro-net

  gateway:
    build: ./gateway/gateway
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - auth-service
      - course-service
      - notification-service
    networks:
      - micro-net

  auth-service:
    build: ./auth-service/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql-auth
      - eureka-server
      - rabbitmq
    networks:
      - micro-net

  course-service:
    build: ./course-service/course-service
    container_name: course-service
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq
      - mysql-course
      - eureka-server
    networks:
      - micro-net

  notification-service:
    build: ./notification-service/notification-service
    container_name: notification-service
    ports:
      - "8083:8083"
    depends_on:
      - rabbitmq
      - eureka-server
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge

volumes:
  mysql-course-data:
  mysql-auth-data:
